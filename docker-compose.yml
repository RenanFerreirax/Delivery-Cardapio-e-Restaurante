    restart: always

    ports:
      - "9521:9521"

    environment:
      PORT: 9521
      NODE_ENV: production
      DATABASE_URL: "mysql://20261_projint5_manha:senac%4012938@edumysql.acesso.rj.senac.br:3306/20261_projint5_manha_delivery_cardapio"
      RABBITMQ_URL: "amqp://admin:admin@10.136.38.50:5672"

